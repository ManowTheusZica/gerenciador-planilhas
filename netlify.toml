[build]
  command = "pip install -r requirements.txt"
  functions = "netlify/functions"
  publish = "."

# Arquivos incluídos na função (app + dependências)
[functions]
  included_files = ["app.py", "supabase_client.py", "templates/**", "static/**"]

# Headers de segurança - nega acesso a arquivos sensíveis
[[headers]]
  for = "/*.py"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"
    Cache-Control = "private, no-cache"

[[headers]]
  for = "/*.json"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/templates/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"
